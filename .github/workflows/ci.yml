name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Typecheck (informational)
        run: npx tsc --noEmit 2>&1 | tail -5 || true
      - name: Build
        run: npm run build
      - name: Verify build outputs
        run: |
          test -f dist/index.cjs || (echo "Missing dist/index.cjs" && exit 1)
          test -f dist/public/index.html || (echo "Missing dist/public/index.html" && exit 1)
          echo "Build outputs verified"
      - name: Security audit
        run: npm audit --audit-level=critical
